<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>vECU — Generic ADAS Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg0:#050810;--bg1:#090d1a;--bg2:#0d1224;--bg3:#111830;
  --border:#1e2d4a;--border2:#263550;
  --accent:#00d4ff;--accent2:#0099cc;--accent3:#00ff9d;
  --warn:#ff6b35;--danger:#ff2d55;--ok:#00ff9d;
  --text:#e2eaff;--text2:#8899bb;--text3:#445577;
  --mono:'Space Mono',monospace;--sans:'DM Sans',sans-serif;
  --r:6px;--r2:10px;
}
html,body{height:100%;overflow:hidden;background:var(--bg0);color:var(--text);font-family:var(--sans)}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,212,255,.012) 2px,rgba(0,212,255,.012) 4px);
}

/* LAYOUT */
#app{display:grid;grid-template-rows:52px 1fr;grid-template-columns:280px 1fr;height:100vh}
#topbar{grid-column:1/-1;display:flex;align-items:center;gap:12px;padding:0 20px;
  background:var(--bg1);border-bottom:1px solid var(--border);z-index:100}
#sidebar{background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#workspace{background:var(--bg0);overflow:hidden;position:relative}

/* TOPBAR */
.logo{font-family:var(--mono);font-size:13px;color:var(--accent);letter-spacing:2px;white-space:nowrap}
.logo span{color:var(--text3)}
.tb-select{
  background:var(--bg2);border:1px solid var(--border2);color:var(--text);
  font-family:var(--mono);font-size:10px;padding:4px 10px;border-radius:var(--r);outline:none;cursor:pointer}
.tb-label{font-family:var(--mono);font-size:9px;color:var(--text3);white-space:nowrap}
.top-btn{
  background:var(--bg2);border:1px solid var(--border2);color:var(--text);
  font-family:var(--mono);font-size:10px;padding:5px 14px;border-radius:var(--r);
  cursor:pointer;letter-spacing:1px;transition:.2s;white-space:nowrap}
.top-btn:hover{border-color:var(--accent);color:var(--accent)}
.top-btn.start{border-color:var(--ok);color:var(--ok)}
.top-btn.start:hover{background:rgba(0,255,157,.1)}
.top-btn.stop{border-color:var(--danger);color:var(--danger)}
.top-btn.stop:hover{background:rgba(255,45,85,.1)}
.conn-dot{width:7px;height:7px;border-radius:50%;background:var(--danger);transition:.3s;flex-shrink:0}
.conn-dot.on{background:var(--ok);box-shadow:0 0 8px var(--ok)}
.conn-label{font-family:var(--mono);font-size:10px;color:var(--text2);white-space:nowrap}

/* SIDEBAR */
.sidebar-section{padding:10px 12px 8px;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-label{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:2px;margin-bottom:7px}
.search-wrap{position:relative}
.search-wrap input{
  width:100%;background:var(--bg2);border:1px solid var(--border2);color:var(--text);
  font-family:var(--sans);font-size:12px;padding:7px 10px 7px 28px;
  border-radius:var(--r);outline:none;transition:.2s}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap::before{content:'⌕';position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}
.cat-tabs{display:flex;gap:3px;flex-wrap:wrap;margin-top:7px}
.cat-tab{font-family:var(--mono);font-size:9px;padding:3px 7px;border-radius:20px;border:1px solid var(--border);color:var(--text3);cursor:pointer;transition:.2s;background:transparent}
.cat-tab.active,.cat-tab:hover{border-color:var(--accent);color:var(--accent)}
#comp-list{flex:1;overflow-y:auto;padding:6px}
#comp-list::-webkit-scrollbar{width:3px}
#comp-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.comp-item{
  display:flex;align-items:center;gap:8px;padding:7px 9px;margin-bottom:3px;
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
  cursor:grab;transition:.2s;user-select:none}
.comp-item:hover{border-color:var(--accent);background:var(--bg3);transform:translateX(2px)}
.comp-item:active{cursor:grabbing;opacity:.7}
.comp-icon{width:26px;height:26px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.comp-info{flex:1;min-width:0}
.comp-name{font-size:11px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.comp-cat{font-family:var(--mono);font-size:9px;color:var(--text3)}
.comp-compat{font-family:var(--mono);font-size:8px;color:var(--accent2);margin-top:1px}
.no-results{text-align:center;padding:20px;font-family:var(--mono);font-size:10px;color:var(--text3)}

/* SIM CONTROLS */
#ctrl-panel{padding:10px 12px;border-top:1px solid var(--border);background:var(--bg1);flex-shrink:0}
.ctrl-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.ctrl-label{font-family:var(--mono);font-size:9px;color:var(--text3);width:72px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ctrl-row select,.ctrl-row input[type=range]{
  flex:1;background:var(--bg2);border:1px solid var(--border);color:var(--text);
  font-family:var(--mono);font-size:10px;padding:4px 7px;border-radius:var(--r);outline:none}
.ctrl-val{font-family:var(--mono);font-size:9px;color:var(--accent);width:38px;text-align:right;flex-shrink:0}
.toggle-wrap{display:flex;align-items:center;gap:6px;flex:1}
.toggle{position:relative;width:32px;height:17px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--border2);border-radius:20px;cursor:pointer;transition:.2s}
.toggle-slider::before{content:'';position:absolute;left:2px;top:2px;width:13px;height:13px;background:var(--text2);border-radius:50%;transition:.2s}
.toggle input:checked + .toggle-slider{background:var(--accent2)}
.toggle input:checked + .toggle-slider::before{transform:translateX(15px);background:#fff}
.ctrl-toggle-label{font-family:var(--mono);font-size:9px;color:var(--text2)}
.ctrl-section-title{
  font-family:var(--mono);font-size:8px;color:var(--accent);letter-spacing:1px;
  margin:6px 0 4px;padding-top:6px;border-top:1px solid var(--border)}

/* WORKSPACE */
#workspace-inner{position:absolute;inset:0;overflow:auto;padding:14px}
#drop-zone{min-height:calc(100vh - 84px);position:relative}
.drop-hint{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;pointer-events:none;opacity:.25;transition:.3s}
.drop-hint.hidden{opacity:0}
.drop-hint svg{width:40px;height:40px;stroke:var(--text3)}
.drop-hint p{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:1px}
#drop-zone.drag-over::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background-image:linear-gradient(rgba(0,212,255,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.06) 1px,transparent 1px);
  background-size:56px 56px;border-radius:var(--r2)}

/* WIDGETS */
.widget{
  position:absolute;background:var(--bg1);border:1px solid var(--border);
  border-radius:var(--r2);overflow:hidden;min-width:160px;min-height:100px;
  box-shadow:0 4px 20px rgba(0,0,0,.4);transition:border-color .2s}
.widget:hover{border-color:var(--border2)}
.widget.selected{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 4px 20px rgba(0,212,255,.2)}
.widget-header{display:flex;align-items:center;gap:7px;padding:7px 9px;background:var(--bg2);border-bottom:1px solid var(--border);cursor:move;user-select:none}
.widget-title{font-family:var(--mono);font-size:10px;color:var(--text2);flex:1;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.widget-signal{font-family:var(--mono);font-size:8px;color:var(--text3);flex-shrink:0}
.widget-close{width:15px;height:15px;border-radius:50%;background:transparent;border:1px solid var(--border2);color:var(--text3);font-size:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;flex-shrink:0}
.widget-close:hover{background:var(--danger);border-color:var(--danger);color:#fff}
.widget-resize{position:absolute;bottom:0;right:0;width:12px;height:12px;cursor:se-resize;border-right:2px solid var(--border2);border-bottom:2px solid var(--border2);border-radius:0 0 var(--r) 0;opacity:.3}
.widget-resize:hover{opacity:1;border-color:var(--accent)}
.widget-body{padding:10px;display:flex;align-items:center;justify-content:center;height:calc(100% - 33px)}

/* Boolean */
.w-bool{display:flex;flex-direction:column;align-items:center;gap:7px;width:100%}
.bool-light{width:44px;height:44px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;transition:.4s}
.bool-light.on{border-color:var(--ok);box-shadow:0 0 18px var(--ok),inset 0 0 8px rgba(0,255,157,.2)}
.bool-light.warn{border-color:var(--warn);box-shadow:0 0 18px var(--warn),inset 0 0 8px rgba(255,107,53,.2)}
.bool-light.danger{border-color:var(--danger);box-shadow:0 0 18px var(--danger)}
.bool-label{font-family:var(--mono);font-size:9px;color:var(--text2);text-align:center}
.bool-val{font-family:var(--mono);font-size:11px;font-weight:700}

/* Gauge */
.w-gauge{display:flex;flex-direction:column;align-items:center;gap:5px;width:100%}
.gauge-svg{width:100px;height:64px}
.gauge-val{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--accent);line-height:1}
.gauge-unit{font-family:var(--mono);font-size:9px;color:var(--text3)}

/* Number */
.w-number{display:flex;flex-direction:column;align-items:center;gap:5px;width:100%}
.num-val{font-family:var(--mono);font-size:28px;font-weight:700;color:var(--accent)}
.num-unit{font-family:var(--mono);font-size:9px;color:var(--text3)}
.num-bar{width:100%;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.num-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:2px;transition:.3s}

/* Enum */
.w-enum{display:flex;flex-direction:column;gap:3px;width:100%}
.enum-item{display:flex;align-items:center;gap:7px;padding:4px 7px;border-radius:var(--r);border:1px solid transparent;font-family:var(--mono);font-size:9px;transition:.2s}
.enum-item.active{background:rgba(0,212,255,.1);border-color:var(--accent);color:var(--accent)}
.enum-dot{width:5px;height:5px;border-radius:50%;background:var(--border2);flex-shrink:0;transition:.2s}
.enum-item.active .enum-dot{background:var(--accent)}

/* Chart */
.w-chart{width:100%;height:100%}
.chart-canvas{width:100%;height:100%;display:block}

/* Log */
.w-log{width:100%;height:100%;overflow:hidden}
.log-lines{height:100%;overflow-y:auto;font-family:var(--mono);font-size:9px;display:flex;flex-direction:column;gap:1px}
.log-lines::-webkit-scrollbar{width:2px}
.log-lines::-webkit-scrollbar-thumb{background:var(--border2)}
.log-line{padding:2px 4px;border-radius:2px;color:var(--text2);display:flex;gap:5px}
.log-line.ok{color:var(--ok)}.log-line.warn{color:var(--warn)}.log-line.error{color:var(--danger)}
.log-time{color:var(--text3);flex-shrink:0}

/* Context menu */
#ctx-menu{position:fixed;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r2);padding:4px;min-width:140px;z-index:1000;display:none;box-shadow:0 8px 32px rgba(0,0,0,.6)}
.ctx-item{padding:6px 11px;font-family:var(--sans);font-size:12px;color:var(--text2);border-radius:var(--r);cursor:pointer;transition:.15s}
.ctx-item:hover{background:var(--bg3);color:var(--text)}
.ctx-item.danger:hover{color:var(--danger)}
.ctx-sep{height:1px;background:var(--border);margin:3px 0}

/* Toasts */
#toasts{position:fixed;bottom:16px;right:16px;z-index:2000;display:flex;flex-direction:column;gap:5px}
.toast{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:7px 12px;font-family:var(--mono);font-size:10px;color:var(--text);animation:slideIn .2s ease;max-width:260px}
.toast.ok{border-color:var(--ok);color:var(--ok)}.toast.error{border-color:var(--danger);color:var(--danger)}
@keyframes slideIn{from{transform:translateX(16px);opacity:0}to{transform:none;opacity:1}}

/* Plugin badge */
.plugin-badge{font-family:var(--mono);font-size:9px;padding:2px 8px;border-radius:20px;border:1px solid var(--accent);color:var(--accent);background:rgba(0,212,255,.08)}
</style>
</head>
<body>
<div id="app">

<!-- TOPBAR -->
<header id="topbar">
  <div class="logo">vECU V <span>//</span> ADAS</div>
  <div class="tb-label">PLUGIN</div>
  <select class="tb-select" id="plugin-select" onchange="onPluginChange()">
    <option value="LPA">LPA — Lane Protection Assist</option>
    <option value="AEB">AEB — Auto Emergency Braking</option>
    <option value="ACC">ACC — Adaptive Cruise Control</option>
    <option value="BSD">BSD — Blind Spot Detection</option>
    <option value="TSR">TSR — Traffic Sign Recognition</option>
  </select>
  <div class="tb-label">VIDEO</div>
  <select class="tb-select" id="video-select">
    <option value="">— select —</option>
  </select>
  <button class="top-btn start" onclick="startSim()">▶ START</button>
  <button class="top-btn stop"  onclick="stopSim()">■ STOP</button>
  <button class="top-btn" onclick="saveLayout()">💾 SAVE</button>
  <button class="top-btn" onclick="clearWorkspace()">✕ CLEAR</button>
  <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
    <div class="conn-dot" id="conn-dot"></div>
    <span class="conn-label" id="conn-label">OFFLINE</span>
  </div>
</header>

<!-- SIDEBAR -->
<aside id="sidebar">

  <div class="sidebar-section">
    <div class="sidebar-label">COMPONENT LIBRARY</div>
    <div class="search-wrap">
      <input type="text" id="search-input" placeholder="Search components..." oninput="filterComponents()"/>
    </div>
    <div class="cat-tabs" id="cat-tabs">
      <div class="cat-tab active" onclick="filterCat(this,'all')">All</div>
      <div class="cat-tab" onclick="filterCat(this,'output')">Output</div>
      <div class="cat-tab" onclick="filterCat(this,'chart')">Chart</div>
      <div class="cat-tab" onclick="filterCat(this,'input')">Input</div>
      <div class="cat-tab" onclick="filterCat(this,'system')">System</div>
    </div>
  </div>

  <div id="comp-list"></div>

  <!-- SIM CONTROLS — DYNAMIC -->
  <div id="ctrl-panel">
    <div class="sidebar-label">SIM CONTROLS</div>
    <div id="ctrl-dynamic"></div>
  </div>

</aside>

<!-- WORKSPACE -->
<main id="workspace">
  <div id="workspace-inner">
    <div id="drop-zone">
      <div class="drop-hint" id="drop-hint">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M12 8v8M8 12h8"/></svg>
        <p>DRAG COMPONENTS HERE</p>
        <p style="font-size:9px;margin-top:-6px">or double-click a component</p>
      </div>
    </div>
  </div>
</main>
</div>

<div id="ctx-menu">
  <div class="ctx-item" onclick="ctxDuplicate()">Duplicate</div>
  <div class="ctx-item" onclick="ctxRename()">Rename</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item danger" onclick="ctxDelete()">Remove</div>
</div>
<div id="toasts"></div>

<script>
// ════════════════════════════════════════════════════════
// PLUGIN DEFINITIONS — controls + compatible components
// ════════════════════════════════════════════════════════
const PLUGINS = {

  LPA: {
    label: 'Lane Protection Assist',
    color: '#00d4ff',
    controls: [
      { type:'slider', key:'speed',       label:'Speed',       min:0,   max:200, default:54,  unit:'km/h' },
      { type:'toggle', key:'lpa_ct',      label:'LPA Enable',  default:true  },
      { type:'toggle', key:'turn_signal', label:'Turn Signal', default:false },
    ],
    defaultWidgets: ['bool_active','bool_warnL','bool_warnR','gauge_conf','gauge_speed','enum_state','chart_conf','log_panel'],
    signals: { active:'LPA Active', warn_L:'Warn Left', warn_R:'Warn Right', conf:'Confidence', cause:'State', leftT:'Left Type', rightT:'Right Type', valid:'Valid', speed:'Speed', frame:'Frame' }
  },

  AEB: {
    label: 'Auto Emergency Braking',
    color: '#ff2d55',
    controls: [
      { type:'slider', key:'speed',         label:'Speed',          min:0,   max:250, default:80,  unit:'km/h' },
      { type:'slider', key:'ttc',           label:'TTC',            min:0,   max:10,  default:4.0, unit:'s',   step:0.1 },
      { type:'slider', key:'obj_distance',  label:'Obj. Distance',  min:0,   max:200, default:50,  unit:'m'   },
      { type:'toggle', key:'aeb_enabled',   label:'AEB Enable',     default:true  },
      { type:'toggle', key:'pedestrian',    label:'Pedestrian Mode', default:false },
    ],
    defaultWidgets: ['bool_active','bool_braking','gauge_speed','gauge_ttc','chart_conf','log_panel'],
    signals: { active:'AEB Active', braking:'Braking', conf:'Confidence', ttc:'TTC', speed:'Speed', frame:'Frame' }
  },

  ACC: {
    label: 'Adaptive Cruise Control',
    color: '#00ff9d',
    controls: [
      { type:'slider', key:'speed',         label:'Ego Speed',      min:0,   max:200, default:100, unit:'km/h' },
      { type:'slider', key:'target_speed',  label:'Target Speed',   min:0,   max:200, default:120, unit:'km/h' },
      { type:'slider', key:'headway',       label:'Headway',        min:1,   max:5,   default:2,   unit:'s',   step:0.5 },
      { type:'toggle', key:'acc_enabled',   label:'ACC Enable',     default:true  },
      { type:'toggle', key:'stop_go',       label:'Stop & Go',      default:true  },
    ],
    defaultWidgets: ['bool_active','gauge_speed','num_offset','chart_conf','enum_state','log_panel'],
    signals: { active:'ACC Active', conf:'Confidence', speed:'Speed', target:'Target Speed', frame:'Frame' }
  },

  BSD: {
    label: 'Blind Spot Detection',
    color: '#ff6b35',
    controls: [
      { type:'slider', key:'speed',         label:'Speed',          min:0,   max:200, default:90,  unit:'km/h' },
      { type:'toggle', key:'bsd_enabled',   label:'BSD Enable',     default:true  },
      { type:'toggle', key:'turn_signal',   label:'Turn Signal',    default:false },
      { type:'toggle', key:'reverse',       label:'Reverse Gear',   default:false },
    ],
    defaultWidgets: ['bool_active','bool_warnL','bool_warnR','gauge_speed','chart_conf','log_panel'],
    signals: { active:'BSD Active', warn_L:'Warn Left', warn_R:'Warn Right', conf:'Confidence', speed:'Speed', frame:'Frame' }
  },

  TSR: {
    label: 'Traffic Sign Recognition',
    color: '#8844ff',
    controls: [
      { type:'slider', key:'speed',         label:'Speed',          min:0,   max:200, default:60,  unit:'km/h' },
      { type:'slider', key:'brightness',    label:'Brightness',     min:0,   max:100, default:80,  unit:'%'   },
      { type:'toggle', key:'tsr_enabled',   label:'TSR Enable',     default:true  },
      { type:'toggle', key:'night_mode',    label:'Night Mode',     default:false },
      { type:'toggle', key:'wet_road',      label:'Wet Road',       default:false },
    ],
    defaultWidgets: ['bool_active','bool_valid','gauge_conf','gauge_speed','chart_conf','enum_state','log_panel'],
    signals: { active:'TSR Active', conf:'Confidence', valid:'Valid', speed:'Speed', frame:'Frame' }
  }
};

// ════════════════════════════════════════════════════════
// COMPONENT LIBRARY
// ════════════════════════════════════════════════════════
const COMPONENTS = [
  {id:'bool_active',  name:'Active Light',      cat:'output', icon:'💡', bg:'#00ff9d18', signal:'active',  type:'boolean', colorMode:'ok',   compatible:['LPA','AEB','ACC','BSD','TSR'], defaultW:180, defaultH:150},
  {id:'bool_warnL',   name:'Warning Left',      cat:'output', icon:'◀',  bg:'#ff6b3518', signal:'warn_L',  type:'boolean', colorMode:'warn', compatible:['LPA','BSD'],                  defaultW:180, defaultH:150},
  {id:'bool_warnR',   name:'Warning Right',     cat:'output', icon:'▶',  bg:'#ff6b3518', signal:'warn_R',  type:'boolean', colorMode:'warn', compatible:['LPA','BSD'],                  defaultW:180, defaultH:150},
  {id:'bool_braking', name:'Braking Active',    cat:'output', icon:'🛑', bg:'#ff2d5518', signal:'braking', type:'boolean', colorMode:'danger',compatible:['AEB'],                        defaultW:180, defaultH:150},
  {id:'bool_valid',   name:'Detection Valid',   cat:'output', icon:'✓',  bg:'#00ff9d18', signal:'valid',   type:'boolean', colorMode:'ok',   compatible:['LPA','AEB','TSR'],            defaultW:180, defaultH:150},
  {id:'gauge_conf',   name:'Confidence Gauge',  cat:'output', icon:'◎',  bg:'#00d4ff18', signal:'conf',    type:'gauge',   min:0, max:100, unit:'%',    compatible:['LPA','AEB','TSR','BSD','ACC'], defaultW:200, defaultH:180},
  {id:'gauge_speed',  name:'Speed Gauge',       cat:'input',  icon:'⟳',  bg:'#0099cc18', signal:'speed',   type:'gauge',   min:0, max:250, unit:'km/h', compatible:['LPA','AEB','ACC','BSD','TSR'], defaultW:200, defaultH:180},
  {id:'gauge_ttc',    name:'TTC Gauge',         cat:'output', icon:'⏱',  bg:'#ff2d5518', signal:'ttc',     type:'gauge',   min:0, max:10,  unit:'s',    compatible:['AEB'],                        defaultW:200, defaultH:180},
  {id:'num_offset',   name:'Lane Offset',       cat:'output', icon:'↔',  bg:'#00d4ff18', signal:'offset',  type:'number',  unit:'%',    min:-100, max:100, compatible:['LPA','ACC'],                   defaultW:200, defaultH:150},
  {id:'num_frames',   name:'Frame Counter',     cat:'system', icon:'⬡',  bg:'#8844ff18', signal:'frame',   type:'number',  unit:'fr',   min:0,    max:9999,compatible:['LPA','AEB','ACC','BSD','TSR'], defaultW:180, defaultH:140},
  {id:'num_lefttype', name:'Left Lane Type',    cat:'output', icon:'╌',  bg:'#00d4ff18', signal:'leftT',   type:'number',  unit:'type', min:0,    max:3,   compatible:['LPA'],                        defaultW:180, defaultH:140},
  {id:'num_righttype',name:'Right Lane Type',   cat:'output', icon:'╌',  bg:'#00d4ff18', signal:'rightT',  type:'number',  unit:'type', min:0,    max:3,   compatible:['LPA'],                        defaultW:180, defaultH:140},
  {id:'enum_state',   name:'System State',      cat:'output', icon:'⬡',  bg:'#8844ff18', signal:'cause',   type:'enum',
    values:{0:'INACTIVE',1:'ACTIVE',2:'WARN_L',3:'WARN_R',4:'LOW_CONF',5:'LPA_ON'},
    compatible:['LPA','AEB','ACC'], defaultW:220, defaultH:185},
  {id:'chart_conf',   name:'Confidence Chart',  cat:'chart',  icon:'📈', bg:'#00d4ff10', signal:'conf',    type:'chart',  chartColor:'#00d4ff', compatible:['LPA','AEB','TSR','BSD','ACC'], defaultW:300, defaultH:190},
  {id:'chart_active', name:'Active Timeline',   cat:'chart',  icon:'📊', bg:'#00ff9d10', signal:'active',  type:'chart',  chartColor:'#00ff9d', compatible:['LPA','AEB','ACC','BSD'],       defaultW:300, defaultH:190},
  {id:'chart_speed',  name:'Speed Chart',       cat:'chart',  icon:'〜', bg:'#0099cc10', signal:'speed',   type:'chart',  chartColor:'#0099cc', compatible:['LPA','AEB','ACC','BSD','TSR'], defaultW:300, defaultH:190},
  {id:'log_panel',    name:'Event Log',         cat:'system', icon:'📋', bg:'#11223310', signal:'log',     type:'log',                           compatible:['LPA','AEB','ACC','BSD','TSR'], defaultW:300, defaultH:210},
];

// ════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════
let currentPlugin = 'LPA';
let currentCat    = 'all';
let searchQuery   = '';
let widgets       = {};
let widgetCounter = 0;
let lastData      = {};
let dragComp      = null;
let selectedWidget= null;
let ctxWidget     = null;
let ctrlValues    = {};
const HIST        = 60;

// ════════════════════════════════════════════════════════
// SOCKET
// ════════════════════════════════════════════════════════
const socket = io({pingTimeout:60000,pingInterval:25000,reconnection:true,reconnectionAttempts:20,reconnectionDelay:2000});
socket.on('connect',    ()=>{ setConn(true); toast('Connected','ok'); });
socket.on('disconnect', ()=>setConn(false));
socket.on('server_ready', ()=>{});
socket.on('error', d=>toast(d.msg,'error'));
socket.on('frame_result', d=>{
  lastData={...lastData,...d.result,frame:d.frame,progress:d.progress};
  updateAllWidgets();
});
socket.on('log', d=>{ updateLogWidgets(d.msg,d.level); });
socket.on('simulation_started', d=>toast(`SIM: ${d.video}`,'ok'));
socket.on('simulation_done', ()=>toast('Done','ok'));

fetch('/api/videos').then(r=>r.json()).then(d=>{
  const s=document.getElementById('video-select');
  d.videos.forEach(v=>{const o=document.createElement('option');o.value=o.textContent=v;s.appendChild(o);});
}).catch(()=>{});

function setConn(on){
  document.getElementById('conn-dot').className='conn-dot'+(on?' on':'');
  document.getElementById('conn-label').textContent=on?'ONLINE':'OFFLINE';
}

// ════════════════════════════════════════════════════════
// PLUGIN CHANGE
// ════════════════════════════════════════════════════════
function onPluginChange(){
  currentPlugin = document.getElementById('plugin-select').value;
  renderControls();
  renderComponentList();
  toast(`Plugin: ${currentPlugin} — ${PLUGINS[currentPlugin].label}`,'ok');
}

// ════════════════════════════════════════════════════════
// DYNAMIC SIM CONTROLS
// ════════════════════════════════════════════════════════
function renderControls(){
  const plugin = PLUGINS[currentPlugin];
  const panel  = document.getElementById('ctrl-dynamic');
  ctrlValues   = {};

  // Initialize defaults
  plugin.controls.forEach(c=>{ ctrlValues[c.key] = c.default; });

  panel.innerHTML = plugin.controls.map((c,i)=>{
    if(c.type==='slider') return `
      <div class="ctrl-row">
        <span class="ctrl-label" title="${c.label}">${c.label}</span>
        <input type="range" min="${c.min}" max="${c.max}" step="${c.step||1}" value="${c.default}"
          oninput="onCtrlChange('${c.key}',+this.value,document.getElementById('cv_${i}'))"/>
        <span class="ctrl-val" id="cv_${i}">${c.default}${c.unit?'<span style=font-size:7px;color:var(--text3)> '+c.unit+'</span>':''}</span>
      </div>`;
    if(c.type==='toggle') return `
      <div class="ctrl-row">
        <span class="ctrl-label" title="${c.label}">${c.label}</span>
        <div class="toggle-wrap">
          <label class="toggle">
            <input type="checkbox" ${c.default?'checked':''} onchange="onCtrlChange('${c.key}',this.checked?1:0)"/>
            <span class="toggle-slider"></span>
          </label>
          <span class="ctrl-toggle-label" id="cv_${i}">${c.default?'ON':'OFF'}</span>
        </div>
      </div>`;
    return '';
  }).join('');
}

function onCtrlChange(key, val, labelEl){
  ctrlValues[key] = val;
  if(labelEl){
    const c = PLUGINS[currentPlugin].controls.find(x=>x.key===key);
    labelEl.innerHTML = typeof val==='number' && !Number.isInteger(val)
      ? val.toFixed(1)+(c&&c.unit?`<span style="font-size:7px;color:var(--text3)"> ${c.unit}</span>`:'')
      : (val===1||val===true?'ON':'OFF');
  }
  // live update speed
  if(key==='speed') socket.emit('update_speed',{speed:+val});
}

// ════════════════════════════════════════════════════════
// SIM START / STOP
// ════════════════════════════════════════════════════════
function startSim(){
  const video = document.getElementById('video-select').value;
  if(!video){ toast('Select a video first','error'); return; }
  const payload = { video, ...ctrlValues,
    speed:      ctrlValues.speed      ?? 54,
    lpa_act:    ctrlValues.lpa_ct     ?? ctrlValues.aeb_enabled ?? ctrlValues.acc_enabled ?? ctrlValues.bsd_enabled ?? ctrlValues.tsr_enabled ?? 1,
    turn_signal: ctrlValues.turn_signal ?? 0,
    plugin:     currentPlugin
  };
  socket.emit('start_simulation', payload);
}
function stopSim(){ socket.emit('stop_simulation'); }

// ════════════════════════════════════════════════════════
// COMPONENT LIST
// ════════════════════════════════════════════════════════
function renderComponentList(){
  const list = document.getElementById('comp-list');
  const q    = searchQuery.toLowerCase();
  const items = COMPONENTS.filter(c=>{
    return c.compatible.includes(currentPlugin)
      && (currentCat==='all'||c.cat===currentCat)
      && (!q || c.name.toLowerCase().includes(q)||c.cat.includes(q));
  });
  if(!items.length){ list.innerHTML='<div class="no-results">No components found</div>'; return; }
  list.innerHTML = items.map(c=>`
    <div class="comp-item" draggable="true" data-id="${c.id}"
      ondragstart="onDragStart(event,'${c.id}')"
      ondblclick="addWidget('${c.id}')">
      <div class="comp-icon" style="background:${c.bg}">${c.icon}</div>
      <div class="comp-info">
        <div class="comp-name">${c.name}</div>
        <div class="comp-cat">${c.cat.toUpperCase()}</div>
        <div class="comp-compat">${c.compatible.join(' · ')}</div>
      </div>
    </div>`).join('');
}

function filterComponents(){ searchQuery=document.getElementById('search-input').value; renderComponentList(); }
function filterCat(el,cat){
  currentCat=cat;
  document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderComponentList();
}

// ════════════════════════════════════════════════════════
// DRAG & DROP
// ════════════════════════════════════════════════════════
const dz = document.getElementById('drop-zone');
const wi = document.getElementById('workspace-inner');
dz.addEventListener('dragover', e=>{ e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave',e=>{ if(!dz.contains(e.relatedTarget)) dz.classList.remove('drag-over'); });
dz.addEventListener('drop', e=>{
  e.preventDefault(); dz.classList.remove('drag-over');
  if(!dragComp) return;
  const r=wi.getBoundingClientRect();
  addWidget(dragComp, Math.max(8,e.clientX-r.left+wi.scrollLeft-80), Math.max(8,e.clientY-r.top+wi.scrollTop-50));
  dragComp=null;
});
function onDragStart(e,id){ dragComp=id; e.dataTransfer.effectAllowed='copy'; }

// ════════════════════════════════════════════════════════
// WIDGET
// ════════════════════════════════════════════════════════
function addWidget(compId, x, y){
  const def = COMPONENTS.find(c=>c.id===compId); if(!def) return;
  const wId = 'w_'+(++widgetCounter);
  const wx  = x ?? 20+(widgetCounter%5)*16;
  const wy  = y ?? 20+(widgetCounter%4)*16;

  const el = document.createElement('div');
  el.className='widget'; el.id=wId;
  el.style.cssText=`left:${wx}px;top:${wy}px;width:${def.defaultW}px;height:${def.defaultH}px`;
  el.innerHTML=`
    <div class="widget-header" onmousedown="startDragWidget(event,'${wId}')">
      <span style="font-size:11px">${def.icon}</span>
      <span class="widget-title">${def.name.toUpperCase()}</span>
      <span class="widget-signal">${def.signal}</span>
      <button class="widget-close" onclick="removeWidget('${wId}')">✕</button>
    </div>
    <div class="widget-body" id="${wId}-body">${buildBody(def,wId)}</div>
    <div class="widget-resize" onmousedown="startResize(event,'${wId}')"></div>`;

  el.addEventListener('click',e=>{ e.stopPropagation(); selectWidget(wId); });
  el.addEventListener('contextmenu',e=>{ e.preventDefault(); ctxWidget=wId; showCtx(e.clientX,e.clientY); });
  dz.appendChild(el);

  widgets[wId]={ el, def, chartData: def.type==='chart'?[]:null };
  document.getElementById('drop-hint').classList.add('hidden');
  updateWidget(wId, lastData);
  selectWidget(wId);
}

function buildBody(def, wId){
  switch(def.type){
    case 'boolean': return `<div class="w-bool"><div class="bool-light" id="${wId}-light">○</div><div class="bool-label">${def.name}</div><div class="bool-val" id="${wId}-val">—</div></div>`;
    case 'gauge':   return `<div class="w-gauge"><svg class="gauge-svg" viewBox="0 0 100 64"><path d="M8 60 A44 44 0 0 1 92 60" fill="none" stroke="#1e2d4a" stroke-width="7" stroke-linecap="round"/><path id="${wId}-arc" d="M8 60 A44 44 0 0 1 92 60" fill="none" stroke="#00d4ff" stroke-width="7" stroke-linecap="round" stroke-dasharray="0 138" style="transition:stroke-dasharray .3s"/></svg><div class="gauge-val" id="${wId}-val">0</div><div class="gauge-unit">${def.unit||''}</div></div>`;
    case 'number':  return `<div class="w-number"><div class="num-val" id="${wId}-val">—</div><div class="num-unit">${def.unit||''}</div><div class="num-bar"><div class="num-fill" id="${wId}-fill" style="width:0%"></div></div></div>`;
    case 'enum':    return `<div class="w-enum">${Object.entries(def.values).map(([k,v])=>`<div class="enum-item" id="${wId}-e${k}"><div class="enum-dot"></div><span>${v}</span></div>`).join('')}</div>`;
    case 'chart':   return `<div class="w-chart"><canvas class="chart-canvas" id="${wId}-canvas"></canvas></div>`;
    case 'log':     return `<div class="w-log"><div class="log-lines" id="${wId}-lines"></div></div>`;
    default: return '<div style="color:var(--text3);font-size:10px;font-family:var(--mono)">—</div>';
  }
}

// ════════════════════════════════════════════════════════
// UPDATE
// ════════════════════════════════════════════════════════
function updateAllWidgets(){ Object.keys(widgets).forEach(id=>updateWidget(id,lastData)); }

function updateWidget(wId, data){
  const w=widgets[wId]; if(!w) return;
  const def=w.def;
  const val=data[def.signal];
  if(val===undefined&&def.type!=='log') return;

  switch(def.type){
    case 'boolean':{
      const on=val==1||val===true;
      const l=document.getElementById(`${wId}-light`);
      const v=document.getElementById(`${wId}-val`);
      if(!l) break;
      l.className='bool-light'+(on?' '+(def.colorMode||'ok'):'');
      l.textContent=on?'●':'○';
      if(v){v.textContent=on?'ON':'OFF';v.style.color=on?'var(--ok)':'var(--text3)';}
      break;}
    case 'gauge':{
      const arc=document.getElementById(`${wId}-arc`);
      const ve=document.getElementById(`${wId}-val`);
      if(!arc||val==null) break;
      const pct=Math.min(1,Math.max(0,(val-(def.min||0))/((def.max||100)-(def.min||0))));
      arc.setAttribute('stroke-dasharray',`${pct*138} 138`);
      if(ve) ve.textContent=typeof val==='number'?val.toFixed(1):val;
      break;}
    case 'number':{
      const ve=document.getElementById(`${wId}-val`);
      const fi=document.getElementById(`${wId}-fill`);
      if(!ve||val==null) break;
      ve.textContent=typeof val==='number'?val.toFixed(1):val;
      if(fi){
        const p=Math.min(100,Math.max(0,((val-(def.min||-100))/((def.max||100)-(def.min||-100)))*100));
        fi.style.width=p+'%';
      }
      break;}
    case 'enum':{
      if(val==null) break;
      Object.keys(def.values).forEach(k=>{
        const el=document.getElementById(`${wId}-e${k}`);
        if(el) el.classList.toggle('active',String(k)===String(Math.round(val)));
      });
      break;}
    case 'chart':{
      if(val==null) break;
      w.chartData.push(val);
      if(w.chartData.length>HIST) w.chartData.shift();
      drawChart(wId);
      break;}
  }
}

function updateLogWidgets(msg,level){
  Object.values(widgets).forEach(w=>{
    if(w.def.type!=='log') return;
    const lines=document.getElementById(`${w.el.id}-lines`);
    if(!lines) return;
    const now=new Date().toLocaleTimeString('fr',{hour12:false});
    const d=document.createElement('div');
    d.className=`log-line ${level||''}`;
    d.innerHTML=`<span class="log-time">${now}</span><span>${msg}</span>`;
    lines.appendChild(d);
    lines.scrollTop=lines.scrollHeight;
    while(lines.children.length>120) lines.removeChild(lines.firstChild);
  });
}

// ════════════════════════════════════════════════════════
// CHART
// ════════════════════════════════════════════════════════
function drawChart(wId){
  const w=widgets[wId]; if(!w) return;
  const canvas=document.getElementById(`${wId}-canvas`); if(!canvas) return;
  const body=document.getElementById(`${wId}-body`);
  canvas.width=body?body.clientWidth:280; canvas.height=body?body.clientHeight:150;
  const ctx=canvas.getContext('2d');
  const data=w.chartData;
  const cw=canvas.width,ch=canvas.height;
  const pad={t:8,r:8,b:18,l:32};
  const W=cw-pad.l-pad.r, H=ch-pad.t-pad.b;
  ctx.clearRect(0,0,cw,ch);
  ctx.strokeStyle='rgba(30,45,74,.7)'; ctx.lineWidth=1;
  for(let i=0;i<=4;i++){const y=pad.t+H-i*(H/4);ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+W,y);ctx.stroke();}
  if(data.length<2) return;
  const mn=Math.min(...data),mx=Math.max(...data),rng=Math.max(mx-mn,0.01);
  const col=w.def.chartColor||'#00d4ff';
  ctx.beginPath(); ctx.strokeStyle=col; ctx.lineWidth=1.5;
  data.forEach((v,i)=>{
    const x=pad.l+i*(W/(HIST-1));
    const y=pad.t+H-((v-mn)/rng)*H;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }); ctx.stroke();
  const gr=ctx.createLinearGradient(0,pad.t,0,pad.t+H);
  const hex=col.length===7?col:'#00d4ff';
  gr.addColorStop(0,hex+'44'); gr.addColorStop(1,hex+'00');
  ctx.fillStyle=gr; ctx.beginPath();
  data.forEach((v,i)=>{const x=pad.l+i*(W/(HIST-1));const y=pad.t+H-((v-mn)/rng)*H;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
  ctx.lineTo(pad.l+W,pad.t+H);ctx.lineTo(pad.l,pad.t+H);ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(68,85,119,.8)';ctx.font='8px Space Mono,monospace';ctx.textAlign='right';
  ctx.fillText(mx.toFixed(1),pad.l-3,pad.t+6);
  ctx.fillText(mn.toFixed(1),pad.l-3,pad.t+H);
}

// ════════════════════════════════════════════════════════
// DRAG WIDGET / RESIZE
// ════════════════════════════════════════════════════════
function startDragWidget(e,wId){
  if(e.target.classList.contains('widget-close')) return;
  e.preventDefault();
  const w=widgets[wId]; if(!w) return;
  const r=w.el.getBoundingClientRect();
  const ox=e.clientX-r.left, oy=e.clientY-r.top;
  selectWidget(wId);
  function mv(ev){ const pr=wi.getBoundingClientRect(); w.el.style.left=Math.max(0,ev.clientX-pr.left+wi.scrollLeft-ox)+'px'; w.el.style.top=Math.max(0,ev.clientY-pr.top+wi.scrollTop-oy)+'px'; }
  function up(){ document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); }
  document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up);
}
function startResize(e,wId){
  e.preventDefault(); e.stopPropagation();
  const w=widgets[wId]; if(!w) return;
  const sx=e.clientX,sy=e.clientY,sw=w.el.offsetWidth,sh=w.el.offsetHeight;
  function mv(ev){ w.el.style.width=Math.max(160,sw+(ev.clientX-sx))+'px'; w.el.style.height=Math.max(100,sh+(ev.clientY-sy))+'px'; if(w.def.type==='chart') drawChart(wId); }
  function up(){ document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); }
  document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up);
}

// ════════════════════════════════════════════════════════
// SELECT / REMOVE
// ════════════════════════════════════════════════════════
function selectWidget(wId){
  if(selectedWidget) document.getElementById(selectedWidget)?.classList.remove('selected');
  selectedWidget=wId;
  document.getElementById(wId)?.classList.add('selected');
}
document.addEventListener('click',()=>{ if(selectedWidget){document.getElementById(selectedWidget)?.classList.remove('selected');selectedWidget=null;} hideCtx(); });
function removeWidget(wId){ const w=widgets[wId]; if(!w) return; w.el.remove(); delete widgets[wId]; if(!Object.keys(widgets).length) document.getElementById('drop-hint').classList.remove('hidden'); }
function clearWorkspace(){ Object.keys(widgets).forEach(removeWidget); toast('Workspace cleared','ok'); }

// ════════════════════════════════════════════════════════
// CONTEXT MENU
// ════════════════════════════════════════════════════════
const ctxMenu=document.getElementById('ctx-menu');
function showCtx(x,y){ ctxMenu.style.cssText=`display:block;left:${x}px;top:${y}px`; }
function hideCtx(){ ctxMenu.style.display='none'; }
function ctxDelete(){ if(ctxWidget) removeWidget(ctxWidget); hideCtx(); }
function ctxDuplicate(){ if(!ctxWidget) return; const w=widgets[ctxWidget]; if(w) addWidget(w.def.id,parseInt(w.el.style.left)+20,parseInt(w.el.style.top)+20); hideCtx(); }
function ctxRename(){ const w=widgets[ctxWidget]; if(!w) return; const n=prompt('Name:',w.def.name); if(n) w.el.querySelector('.widget-title').textContent=n.toUpperCase(); hideCtx(); }

// ════════════════════════════════════════════════════════
// SAVE / LOAD
// ════════════════════════════════════════════════════════
function saveLayout(){
  const layout=Object.values(widgets).map(w=>({compId:w.def.id,x:parseInt(w.el.style.left),y:parseInt(w.el.style.top),w:w.el.offsetWidth,h:w.el.offsetHeight}));
  localStorage.setItem(`vecu_layout_${currentPlugin}`,JSON.stringify(layout));
  toast(`Layout saved (${layout.length} widgets)`,'ok');
}
function loadLayout(){
  const raw=localStorage.getItem(`vecu_layout_${currentPlugin}`);
  if(!raw) return;
  try{
    const layout=JSON.parse(raw);
    clearWorkspace();
    layout.forEach(item=>{
      addWidget(item.compId,item.x,item.y);
      const w=widgets['w_'+widgetCounter];
      if(w){w.el.style.width=item.w+'px';w.el.style.height=item.h+'px';}
    });
    toast(`Layout restored`,'ok');
  } catch(e){ toast('Load failed','error'); }
}

// ════════════════════════════════════════════════════════
// TOAST
// ════════════════════════════════════════════════════════
function toast(msg,type=''){
  const t=document.createElement('div');
  t.className=`toast ${type}`; t.textContent=msg;
  document.getElementById('toasts').appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

// ════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════
renderControls();
renderComponentList();
loadLayout();

if(!Object.keys(widgets).length){
  const defs = PLUGINS[currentPlugin].defaultWidgets;
  const positions = [[20,20],[210,20],[400,20],[590,20],[20,180],[230,180],[450,180],[20,370]];
  defs.forEach((id,i)=>{ const p=positions[i]||[20+i*20,20+i*20]; addWidget(id,p[0],p[1]); });
}
</script>
